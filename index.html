    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">

        <div id="provinceCount" class="text-3xl font-bold text-blue-700 mt-1">0</div>
      </div>
      <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-4 text-center">
        <div class="text-sm text-gray-500">Số xã/phường</div>
        <div id="wardCount" class="text-3xl font-bold text-blue-700 mt-1">0</div>
      </div>
      <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-4 text-center">
        <div class="text-sm text-gray-500">Số trường</div>
        <div id="schoolCount" class="text-3xl font-bold text-blue-700 mt-1">0</div>
      </div>
      <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-4 text-center">
        <div class="text-sm text-gray-500">Kết quả hiển thị</div>
        <div id="resultCount" class="text-3xl font-bold text-blue-700 mt-1">0</div>

    </div>

    <div class="flex flex-wrap justify-center gap-4 mb-8">

        Mã Tỉnh & Xã/Phường

      <button onclick="switchTab('tab-truong')" id="btn-truong" class="px-6 py-3 rounded-full font-medium text-gray-600 bg-white hover:bg-gray-100 shadow-md transition transform hover:-translate-y-1">
        Mã Trường THPT

    </div>

    <div id="globalAlert" class="hidden mb-4 rounded-xl border px-4 py-3 text-sm"></div>

    <div id="tab-hanhchinh" class="tab-content active bg-white rounded-2xl shadow-lg p-6 lg:p-8">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Chế độ tra cứu</label>
          <select id="adminMode" class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
            <option value="province">Mã Tỉnh/Thành phố</option>
            <option value="ward">Mã Xã/Phường</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Chọn Tỉnh/Thành phố</label>

            <option value="">-- Tất cả Tỉnh/Thành phố --</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Tìm theo mã</label>
          <input type="text" id="codeSearch" placeholder="Nhập mã tỉnh hoặc mã xã/phường..." class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Tìm theo tên</label>
          <input type="text" id="nameSearch" placeholder="Nhập tên tỉnh hoặc xã/phường..." class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-50">
        </div>
      </div>

      <div class="overflow-x-auto border border-gray-200 rounded-lg max-h-[560px]">
        <table class="min-w-full divide-y divide-gray-200 text-sm">
          <thead class="bg-gray-50 sticky top-0">
            <tr>
              <th class="px-6 py-4 text-left font-semibold text-gray-600 w-32">Mã số</th>
              <th class="px-6 py-4 text-left font-semibold text-gray-600">Tên đơn vị hành chính</th>
              <th class="px-6 py-4 text-left font-semibold text-gray-600">Thuộc Tỉnh/Thành phố</th>
            </tr>
          </thead>

        </table>
      </div>
      <div id="adminCount" class="mt-4 text-sm text-gray-500 text-right"></div>
    </div>

    <div id="tab-truong" class="tab-content bg-white rounded-2xl shadow-lg p-6 lg:p-8">

        </div>
      </div>

    "name": "Trường THPT Trần Quốc Tuấn",
    "addr": "Định Thành, xã Phú Hòa 1, tỉnh Đắk Lắk",
    "commune": "xã Phú Hòa 1"
  }
];

    let provinces = [];
    let wards = [];
    let adminMode = 'province';

    function removeAccents(str) {
      return (str || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/đ/g, 'd')
        .replace(/Đ/g, 'D')
        .toLowerCase();
    }

    function showAlert(message = '', isError = true) {
      const box = document.getElementById('globalAlert');
      if (!message) {
        box.className = 'hidden mb-4 rounded-xl border px-4 py-3 text-sm';
        box.textContent = '';
        return;
      }
      box.className = 'mb-4 rounded-xl border px-4 py-3 text-sm';
      box.textContent = message;
      if (isError) {
        box.classList.add('bg-red-50', 'border-red-200', 'text-red-700');
      } else {
        box.classList.add('bg-emerald-50', 'border-emerald-200', 'text-emerald-700');
      }
    }

    function switchTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');

      const btnHanhChinh = document.getElementById('btn-hanhchinh');
      const btnTruong = document.getElementById('btn-truong');

      if (tabId === 'tab-hanhchinh') {
        btnHanhChinh.className = "px-6 py-3 rounded-full font-medium text-white bg-blue-600 shadow-md transition transform hover:-translate-y-1";
        btnTruong.className = "px-6 py-3 rounded-full font-medium text-gray-600 bg-white hover:bg-gray-100 shadow-md transition transform hover:-translate-y-1";
        renderAdminTable();
      } else {
        btnTruong.className = "px-6 py-3 rounded-full font-medium text-white bg-blue-600 shadow-md transition transform hover:-translate-y-1";
        btnHanhChinh.className = "px-6 py-3 rounded-full font-medium text-gray-600 bg-white hover:bg-gray-100 shadow-md transition transform hover:-translate-y-1";
        renderSchools();
      }
    }

    function buildDataMaps(dataObj) {
      const provinceArr = [];
      const wardArr = [];

      Object.entries(dataObj).forEach(([provinceCode, provinceData]) => {
        if (!provinceData || typeof provinceData !== 'object') return;
        const provinceName = provinceData.name || `Mã ${provinceCode}`;

        provinceArr.push({
          id: String(provinceCode),
          name: provinceName,
          wardCount: Array.isArray(provinceData.wards) ? provinceData.wards.length : 0
        });

        if (Array.isArray(provinceData.wards)) {
          provinceData.wards.forEach((ward) => {
            if (!ward) return;
            wardArr.push({
              id: String(ward.code || ''),
              name: String(ward.name || ''),
              provinceId: String(provinceCode),
              provinceName
            });
          });
        }
      });

      provinceArr.sort((a, b) => a.name.localeCompare(b.name, 'vi'));
      wardArr.sort((a, b) => a.name.localeCompare(b.name, 'vi'));

      return { provinceArr, wardArr };
    }

    function populateProvinceSelect() {
      const provinceSelect = document.getElementById('provinceSelect');
      provinceSelect.innerHTML = '<option value="">-- Tất cả Tỉnh/Thành phố --</option>';
      provinces.forEach((prov) => {
        const option = document.createElement('option');
        option.value = prov.id;
        option.textContent = `${prov.id} - ${prov.name}`;
        provinceSelect.appendChild(option);
      });
    }

    function updateSummary(resultCount = 0) {
      document.getElementById('provinceCount').textContent = provinces.length.toLocaleString('vi-VN');
      document.getElementById('wardCount').textContent = wards.length.toLocaleString('vi-VN');
      document.getElementById('schoolCount').textContent = schoolData.length.toLocaleString('vi-VN');
      document.getElementById('resultCount').textContent = resultCount.toLocaleString('vi-VN');
    }

    function renderAdminTable() {
      const provinceId = document.getElementById('provinceSelect').value;
      const codeSearch = removeAccents(document.getElementById('codeSearch').value.trim());
      const nameSearch = removeAccents(document.getElementById('nameSearch').value.trim());
      const tbody = document.getElementById('adminTableBody');
      tbody.innerHTML = '';
      let count = 0;

      if (adminMode === 'province') {
        const filtered = provinces.filter((prov) => {
          const okProvince = !provinceId || prov.id === provinceId;
          const okCode = !codeSearch || prov.id.includes(codeSearch);
          const okName = !nameSearch || removeAccents(prov.name).includes(nameSearch);
          return okProvince && okCode && okName;
        });

        filtered.forEach((prov) => {
          count++;
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td class="px-6 py-4 whitespace-nowrap text-blue-600 font-medium">${prov.id}</td>
            <td class="px-6 py-4 text-gray-800 font-medium">${prov.name}</td>
            <td class="px-6 py-4 whitespace-nowrap text-gray-500">Tỉnh/Thành phố</td>
          `;
          tbody.appendChild(tr);
        });
      } else {
        const filtered = wards.filter((ward) => {
          const okProvince = !provinceId || ward.provinceId === provinceId;
          const okCode = !codeSearch || ward.id.includes(codeSearch);
          const okName = !nameSearch
            || removeAccents(ward.name).includes(nameSearch)
            || removeAccents(ward.provinceName).includes(nameSearch);
          return okProvince && okCode && okName;
        });

        filtered.forEach((ward) => {
          count++;
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td class="px-6 py-4 whitespace-nowrap text-blue-600 font-medium">${ward.id}</td>
            <td class="px-6 py-4 text-gray-800">${ward.name}</td>
            <td class="px-6 py-4 whitespace-nowrap text-gray-500">${ward.provinceName}</td>
          `;
          tbody.appendChild(tr);
        });
      }

      document.getElementById('adminCount').textContent = `Hiển thị: ${count} kết quả`;
      updateSummary(count);
    }

    function renderSchools() {
      const searchVal = removeAccents(document.getElementById('schoolSearch').value.trim());
      const tbody = document.getElementById('schoolTableBody');
      tbody.innerHTML = '';
      let count = 0;

      schoolData.forEach((school) => {
        const searchStr = removeAccents(`${school.id} ${school.name} ${school.addr} ${school.commune}`);
        if (searchStr.includes(searchVal)) {
          count++;
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td class="px-6 py-4 whitespace-nowrap text-blue-600 font-medium">${school.id}</td>
            <td class="px-6 py-4 font-medium text-gray-800">${school.name}</td>
            <td class="px-6 py-4 text-gray-600">${school.addr}</td>
            <td class="px-6 py-4 whitespace-nowrap text-gray-500">${school.commune || ''}</td>
          `;
          tbody.appendChild(tr);
        }
      });

      document.getElementById('schoolTableCount').textContent = `Hiển thị: ${count} trường / điểm tiếp nhận`;
      updateSummary(count);
    }

    async function bootstrapData() {
      try {
        const response = await fetch(DEFAULT_JSON_PATH + '?v=' + Date.now(), {
          method: 'GET',
          cache: 'no-store'
        });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const data = await response.json();
        const mapped = buildDataMaps(data);
        provinces = mapped.provinceArr;
        wards = mapped.wardArr;
        populateProvinceSelect();
        renderAdminTable();
        renderSchools();
        showAlert(`Đã nạp dữ liệu thành công từ ${DEFAULT_JSON_PATH}.`, false);
      } catch (error) {
        console.error('Lỗi tải JSON:', error);
        provinces = [];
        wards = [];
        renderAdminTable();
        renderSchools();
        showAlert('Không tải được file maxa_clean.json. Hãy kiểm tra đúng tên file và đúng thư mục trên GitHub Pages.');
      }
    }

    document.getElementById('adminMode').addEventListener('change', (e) => {
      adminMode = e.target.value;
      renderAdminTable();
    });
    document.getElementById('provinceSelect').addEventListener('change', renderAdminTable);
    document.getElementById('codeSearch').addEventListener('input', renderAdminTable);
    document.getElementById('nameSearch').addEventListener('input', renderAdminTable);
    document.getElementById('schoolSearch').addEventListener('input', renderSchools);

    bootstrapData();
  </script>
</body>
</html>
